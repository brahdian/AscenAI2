name: CI

on:
  push:
    branches: [main, master, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Python linting & type checking
  # ---------------------------------------------------------------------------
  lint-python:
    name: Python lint & typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, mcp-server, ai-orchestrator, voice-pipeline]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Ruff lint
        run: ruff check services/${{ matrix.service }}/app --select E,W,F,I --ignore E501,E402,F401

      - name: Ruff format check
        run: ruff format services/${{ matrix.service }}/app --check

  # ---------------------------------------------------------------------------
  # Frontend lint + build
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx next lint --max-warnings 0 || true   # warn-only until baseline clean

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000

  # ---------------------------------------------------------------------------
  # Backend tests
  # ---------------------------------------------------------------------------
  test-api-gateway:
    name: API gateway tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ascenai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: services/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api-gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx aiosqlite

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ascenai_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-environment-32chars
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Docker build check (no push — validates Dockerfiles build cleanly)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, mcp-server, ai-orchestrator, voice-pipeline]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-frontend:
    name: Docker build (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend/web
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=https://placeholder.example.com
            NEXT_PUBLIC_WS_URL=wss://placeholder.example.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
