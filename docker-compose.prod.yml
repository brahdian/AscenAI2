# docker-compose.prod.yml — Production overrides
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file:
#   - Removes direct port exposure (all traffic via nginx)
#   - Sets uvicorn multi-worker mode
#   - Adds memory/CPU limits
#   - Uses strong postgres credentials from env
#   - Mounts persistent document storage
#   - Adds nginx reverse proxy with TLS

version: "3.9"

services:
  # -------------------------------------------------------------------------
  # Infrastructure overrides
  # -------------------------------------------------------------------------
  postgres:
    ports: []                         # No direct DB access from outside
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ascenai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-ascenai}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    # HIGH-6/M-8: TLS-encrypted Redis connections.
    # Mount TLS certificates at infrastructure/redis/tls/{ca.crt,redis.crt,redis.key}.
    # Generate with: openssl req -x509 -newkey rsa:4096 -keyout redis.key -out redis.crt ...
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --tls-port 6380
      --port 0
      --tls-cert-file /tls/redis.crt
      --tls-key-file /tls/redis.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients no
      --save ""
    ports: []
    volumes:
      - ./infrastructure/redis/tls:/tls:ro
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Qdrant removed in favor of pgvector

  # -------------------------------------------------------------------------
  # Backend service overrides — multi-worker uvicorn
  # -------------------------------------------------------------------------
  api-gateway:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000",
              "--workers", "4", "--log-level", "warning"]
    ports: []
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ascenai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ascenai}
      # HIGH-6/M-8: use rediss:// (TLS) scheme now that Redis is TLS-only
      REDIS_URL: rediss://:${REDIS_PASSWORD}@redis:6380/0
      ENVIRONMENT: production
      DEBUG: "false"
      COOKIE_DOMAIN: ${DOMAIN}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  mcp-server:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001",
              "--workers", "2", "--log-level", "warning"]
    ports: []
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ascenai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ascenai}
      REDIS_URL: rediss://:${REDIS_PASSWORD}@redis:6380/0
      ENVIRONMENT: production
    volumes:
      - document_storage:/data/documents
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  ai-orchestrator:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002",
              "--workers", "2", "--log-level", "warning"]
    ports: []
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ascenai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ascenai}
      REDIS_URL: rediss://:${REDIS_PASSWORD}@redis:6380/0
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  voice-pipeline:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003",
              "--workers", "2", "--log-level", "warning"]
    ports: []
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # -------------------------------------------------------------------------
  # Frontend
  # -------------------------------------------------------------------------
  frontend:
    ports: []
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}
      NEXT_PUBLIC_WS_URL: wss://${DOMAIN}
      NEXT_PUBLIC_ROOT_DOMAIN: ${DOMAIN}
      NEXT_PUBLIC_ADMIN_SUBDOMAIN: admin.${DOMAIN}
      ADMIN_SUBDOMAIN: admin.${DOMAIN}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AscenAI}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # -------------------------------------------------------------------------
  # Nginx reverse proxy (TLS termination, rate limiting)
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api-gateway
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # -------------------------------------------------------------------------
  # M-9: Automated daily Postgres backups
  # Dumps the database every 24 h to /backups inside the container.
  # Mount a host volume or object-storage fuse mount at that path.
  # Retains the last 7 daily backups; older ones are pruned automatically.
  # -------------------------------------------------------------------------
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_USER: ${POSTGRES_USER:-ascenai}
      POSTGRES_DB: ${POSTGRES_DB:-ascenai}
      POSTGRES_HOST: postgres
    volumes:
      - db_backups:/backups
    entrypoint: >
      sh -c "
        while true; do
          BACKUP_FILE=/backups/ascenai_$$(date +%Y%m%d_%H%M%S).dump;
          pg_dump -Fc -h $$POSTGRES_HOST -U $$POSTGRES_USER $$POSTGRES_DB > $$BACKUP_FILE
          && echo \"Backup written: $$BACKUP_FILE\"
          || echo \"Backup FAILED\";
          find /backups -name '*.dump' -mtime +7 -delete;
          sleep 86400;
        done
      "
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  document_storage:
  certbot_www:
  db_backups:
