services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ascenai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-ascenai}
    # VULN-041 FIX: Do not expose database port to host in production
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ascenai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    # VULN-041 FIX: Do not expose Redis port to host in production
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-} ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - data-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ---------------------------------------------------------------------------
  # Email Testing (Development)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MH_UI_WEB_PATH: ""
    networks:
      - backend-net
      - data-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ---------------------------------------------------------------------------
  # Backend Services
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ascenai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ascenai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MCP_SERVER_URL: http://mcp-server:8001
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8002
      VOICE_PIPELINE_URL: http://voice-pipeline:8003
    command: >
      sh -c "python -m app.scripts.seed_platform && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
      voice-pipeline:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f --max-time 10 http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - frontend-net
      - backend-net
      - data-net
      - mcp-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  mcp-server:
    build:
      context: ./services/mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    # VULN-041 FIX: MCP Server should not be directly accessible from outside
    # ports:
    #   - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ascenai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ascenai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
      - data-net
      - mcp-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  ai-orchestrator:
    build:
      context: ./services/ai-orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    # VULN-041 FIX: Orchestrator should not be directly accessible from outside
    # ports:
    #   - "8002:8002"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ascenai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ascenai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MCP_SERVER_URL: http://mcp-server:8001
      MCP_WS_URL: ws://mcp-server:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f --max-time 10 http://localhost:8002/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - backend-net
      - data-net
      - mcp-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  voice-pipeline:
    build:
      context: ./services/voice-pipeline
      dockerfile: Dockerfile
    restart: unless-stopped
    # VULN-041 FIX: Voice Pipeline should not be directly accessible from outside
    # ports:
    #   - "8003:8003"
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8002
      AI_ORCHESTRATOR_WS_URL: ws://ai-orchestrator:8002
    depends_on:
      redis:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f --max-time 10 http://localhost:8003/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - backend-net
      - data-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api.lvh.me:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://api.lvh.me:8000}
        NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-lvh.me:3000}
        NEXT_PUBLIC_ADMIN_SUBDOMAIN: ${NEXT_PUBLIC_ADMIN_SUBDOMAIN:-admin.lvh.me:3000}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AscenAI}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api.lvh.me:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://api.lvh.me:8000}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-lvh.me:3000}
      NEXT_PUBLIC_ADMIN_SUBDOMAIN: ${NEXT_PUBLIC_ADMIN_SUBDOMAIN:-admin.lvh.me:3000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AscenAI}
      ADMIN_SUBDOMAIN: ${ADMIN_SUBDOMAIN:-admin.lvh.me:3000}
    depends_on:
      - api-gateway
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

volumes:
  postgres_data:
  redis_data:

# VULN-041 FIX: Network segmentation by trust boundary
# backend-net: API Gateway, AI Orchestrator, Voice Pipeline (trusted services)
# data-net: Postgres, Redis (data layer — only backend services can reach)
# mcp-net: MCP Server + integrations (untrusted tool execution zone)
# frontend-net: Frontend + API Gateway (public-facing)
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  data-net:
    driver: bridge
  mcp-net:
    driver: bridge
