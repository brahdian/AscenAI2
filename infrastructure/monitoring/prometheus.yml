global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']

  - job_name: 'mcp-server'
    static_configs:
      - targets: ['mcp-server:8001']

  - job_name: 'ai-orchestrator'
    static_configs:
      - targets: ['ai-orchestrator:8002']

  - job_name: 'voice-pipeline'
    static_configs:
      - targets: ['voice-pipeline:8003']
