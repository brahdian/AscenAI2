# ---------------------------------------------------------------------------
# AscenAI ModSecurity Exclusion Rules
# ---------------------------------------------------------------------------

# Allow large payloads for API requests
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 10485760

# Exclude health check endpoints
SecRule REQUEST_URI "@beginsWith /health" \
    "id:1000,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920350,\
    ctl:ruleRemoveById=949110,\
    ctl:ruleRemoveById=980130"

# Exclude Prometheus metrics endpoint
SecRule REQUEST_URI "@beginsWith /metrics" \
    "id:1001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920350"

# Allow WebSocket upgrade requests
SecRule REQUEST_URI "@beginsWith /ws" \
    "id:1002,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920230,\
    ctl:ruleRemoveById=920260,\
    ctl:ruleRemoveById=920310"

# Allow JSON payloads for API endpoints
SecRule REQUEST_URI "@beginsWith /api" \
    "id:1003,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920350,\
    ctl:ruleRemoveTargetById=932100;ARGS,\
    ctl:ruleRemoveTargetById=932110;ARGS,\
    ctl:ruleRemoveTargetById=942100;ARGS"

# Allow SSE connections
SecRule REQUEST_URI "@beginsWith /events" \
    "id:1004,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920230"

# Relax SQLi detection for agent configuration (contains code)
SecRule REQUEST_FILENAME "@rx /api/v1/(agents|workflows)/" \
    "id:1005,\
    phase:2,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=942100,\
    ctl:ruleRemoveById=942110,\
    ctl:ruleRemoveById=942120,\
    ctl:ruleRemoveById=942130,\
    ctl:ruleRemoveById=942140,\
    ctl:ruleRemoveById=942150,\
    ctl:ruleRemoveById=942160,\
    ctl:ruleRemoveById=942170,\
    ctl:ruleRemoveById=942180,\
    ctl:ruleRemoveById=942190"
